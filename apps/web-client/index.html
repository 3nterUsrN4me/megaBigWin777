<!DOCTYPE html>
<html lang="pl" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MegaBigWin777 — Blackjack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              felt: {
                DEFAULT: "#1a5c38",
                dark: "#12401f",
                light: "#236b44",
                border: "#2d7a50",
              },
              chip: {
                gold: "#f5c842",
                red: "#e03535",
              },
            },
            fontFamily: {
              cards: ["Georgia", "serif"],
            },
            animation: {
              "deal-in": "dealIn 0.35s ease-out",
              "flip-card": "flipCard 0.4s ease-in-out",
              "result-pop": "resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1)",
              "pulse-slow": "pulse 2.5s cubic-bezier(0.4,0,0.6,1) infinite",
            },
            keyframes: {
              dealIn: {
                "0%": { opacity: "0", transform: "translateY(-40px) rotate(-5deg) scale(0.8)" },
                "100%": { opacity: "1", transform: "translateY(0) rotate(0) scale(1)" },
              },
              flipCard: {
                "0%": { transform: "rotateY(90deg) scale(0.9)" },
                "100%": { transform: "rotateY(0deg) scale(1)" },
              },
              resultPop: {
                "0%": { opacity: "0", transform: "scale(0.6)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      body { background: radial-gradient(ellipse at center, #1a5c38 0%, #0d3a22 100%); }
      .card {
        width: 72px; height: 100px;
        border-radius: 8px;
        box-shadow: 2px 3px 8px rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center;
        font-family: Georgia, serif;
        font-size: 1.1rem; font-weight: bold;
        position: relative;
        transition: transform 0.15s ease;
        animation: dealIn 0.35s ease-out;
        flex-shrink: 0;
      }
      .card:hover { transform: translateY(-6px); }
      .card-face { background: #fff; color: #111; border: 1.5px solid #ddd; }
      .card-face.red { color: #c0392b; }
      .card-back {
        background: linear-gradient(135deg, #1a237e 25%, #283593 25%, #283593 50%, #1a237e 50%, #1a237e 75%, #283593 75%);
        background-size: 12px 12px;
        border: 2px solid #3949ab;
      }
      .card-value { font-size: 1.3rem; line-height:1; }
      .card-suit  { font-size: 1.2rem; line-height:1; }
      .card-corner-tl { position: absolute; top:4px; left:6px; font-size:0.75rem; line-height:1.1; text-align:center; }
      .card-corner-br { position: absolute; bottom:4px; right:6px; font-size:0.75rem; line-height:1.1; text-align:center; transform:rotate(180deg); }

      .btn-action {
        transition: all 0.15s ease;
        user-select: none;
      }
      .btn-action:not(:disabled):hover { transform: translateY(-2px); filter: brightness(1.1); }
      .btn-action:not(:disabled):active { transform: translateY(0); }
      .btn-action:disabled { opacity: 0.35; cursor: not-allowed; }

      .log-entry { animation: dealIn 0.2s ease-out; }

      #result-banner {
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .badge-status {
        font-size: 0.65rem;
        letter-spacing: 0.08em;
      }

      @keyframes glow {
        0%, 100% { box-shadow: 0 0 6px 2px rgba(245,200,66,0.5); }
        50%       { box-shadow: 0 0 18px 6px rgba(245,200,66,0.9); }
      }
      .chip-glow { animation: glow 1.8s ease-in-out infinite; }
    </style>
  </head>

  <body class="h-full min-h-screen flex flex-col text-white select-none">

    <!-- ══ HEADER ════════════════════════════════════════════════════════════ -->
    <header class="flex items-center justify-between px-6 py-3 bg-black/30 backdrop-blur border-b border-felt-border">
      <div class="flex items-center gap-3">
        <span class="text-2xl">🃏</span>
        <span class="font-bold text-xl tracking-widest text-chip-gold">MEGABIGWIN<span class="text-white opacity-60">777</span></span>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <!-- Connection status -->
        <div id="conn-status" class="flex items-center gap-2">
          <span id="conn-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-gray-500"></span>
          <span id="conn-label" class="text-gray-400 badge-status uppercase tracking-widest">Rozłączony</span>
        </div>
        <!-- Chips counter -->
        <div class="flex items-center gap-1.5 bg-black/40 rounded-full px-3 py-1 chip-glow" id="chips-badge">
          <span class="text-chip-gold text-base">🪙</span>
          <span id="chips-display" class="font-bold text-chip-gold text-sm">–</span>
        </div>
      </div>
    </header>

    <!-- ══ MAIN CONTENT ══════════════════════════════════════════════════════ -->
    <main class="flex-1 flex flex-col items-center justify-between py-4 px-2 gap-4 overflow-hidden">

      <!-- ── DEALER SECTION ─────────────────────────────────────────────── -->
      <section class="w-full max-w-2xl flex flex-col items-center gap-2">
        <div class="flex items-center gap-3 mb-1">
          <span class="text-xs uppercase tracking-widest text-white/50 font-semibold">Krupier</span>
          <div id="dealer-score-badge"
               class="hidden text-xs font-bold px-2.5 py-0.5 rounded-full bg-black/50 border border-white/20 text-white/80">
            <span id="dealer-score">0</span>
          </div>
        </div>
        <div id="dealer-hand"
             class="flex flex-wrap justify-center gap-2 min-h-[108px] items-center">
          <!-- Karty dealera renderowane dynamicznie -->
          <p class="text-white/25 text-sm italic">czekam na rozdanie…</p>
        </div>
      </section>

      <!-- ── CENTER DIVIDER ─────────────────────────────────────────────── -->
      <div class="w-full max-w-2xl">
        <div class="h-px bg-gradient-to-r from-transparent via-felt-border to-transparent"></div>
        <div class="flex items-center justify-center -mt-3">
          <div id="game-status-pill"
               class="bg-felt-dark border border-felt-border rounded-full px-4 py-1 text-xs font-semibold uppercase tracking-widest text-white/60">
            Blackjack
          </div>
        </div>
      </div>

      <!-- ── RESULT BANNER ──────────────────────────────────────────────── -->
      <div id="result-banner" class="hidden absolute inset-0 flex items-center justify-center z-10">
        <div id="result-text"
             class="text-6xl font-extrabold tracking-wider animate-result-pop drop-shadow-2xl">
        </div>
      </div>

      <!-- ── PLAYER SECTION ─────────────────────────────────────────────── -->
      <section class="w-full max-w-2xl flex flex-col items-center gap-2">
        <div id="player-hand"
             class="flex flex-wrap justify-center gap-2 min-h-[108px] items-center">
          <p class="text-white/25 text-sm italic">twoje karty pojawią się tutaj…</p>
        </div>
        <div class="flex items-center gap-4 mt-1">
          <div id="player-score-badge"
               class="hidden text-sm font-bold px-3 py-1 rounded-full bg-black/50 border border-white/20 text-white/80">
            <span id="player-score">0</span>
          </div>
          <div id="bet-badge"
               class="hidden text-xs font-semibold px-3 py-1 rounded-full bg-chip-gold/20 border border-chip-gold/40 text-chip-gold">
            Zakład: <span id="bet-display">0</span> 🪙
          </div>
        </div>
      </section>

    </main>

    <!-- ══ ACTION PANEL ══════════════════════════════════════════════════════ -->
    <footer class="w-full bg-black/40 backdrop-blur border-t border-felt-border px-4 py-4">
      <div class="max-w-2xl mx-auto flex flex-col gap-4">

        <!-- JOIN FORM -->
        <div id="join-panel" class="flex flex-col sm:flex-row items-center gap-3">
          <div class="flex-1 flex gap-2 w-full">
            <input id="input-table-id"
                   type="text"
                   placeholder="Table ID (UUID lub dowolny)"
                   value="table-dev-001"
                   class="flex-1 bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-chip-gold/60 focus:bg-white/15 transition" />
            <input id="input-bet"
                   type="number"
                   placeholder="Zakład"
                   value="50"
                   min="1"
                   class="w-24 bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-chip-gold/60 focus:bg-white/15 transition" />
            <input id="input-player-id"
                   type="text"
                   placeholder="Player ID (UUID)"
                   value=""
                   class="w-40 bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-chip-gold/60 focus:bg-white/15 transition" />
          </div>
          <button id="btn-join"
                  class="btn-action w-full sm:w-auto bg-chip-gold text-black font-bold px-6 py-2.5 rounded-lg text-sm uppercase tracking-widest shadow-lg hover:bg-yellow-300">
            JOIN ROOM
          </button>
        </div>

        <!-- GAME ACTIONS -->
        <div id="action-panel" class="hidden flex-row items-center justify-center gap-3">
          <button id="btn-hit"
                  disabled
                  class="btn-action flex-1 max-w-[140px] bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl uppercase tracking-widest text-sm shadow">
            HIT
          </button>
          <button id="btn-stand"
                  disabled
                  class="btn-action flex-1 max-w-[140px] bg-red-700 hover:bg-red-600 text-white font-bold py-3 rounded-xl uppercase tracking-widest text-sm shadow">
            STAND
          </button>
          <button id="btn-double"
                  disabled
                  class="btn-action flex-1 max-w-[140px] bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl uppercase tracking-widest text-sm shadow">
            DOUBLE
          </button>
          <button id="btn-leave"
                  class="btn-action flex-1 max-w-[120px] bg-white/10 hover:bg-white/20 border border-white/20 text-white/70 font-semibold py-3 rounded-xl uppercase tracking-widest text-xs shadow">
            LEAVE
          </button>
        </div>

        <!-- NEW GAME button (shown after FINISHED) -->
        <div id="new-game-panel" class="hidden justify-center">
          <button id="btn-new-game"
                  class="btn-action bg-chip-gold text-black font-bold px-8 py-3 rounded-xl uppercase tracking-widest text-sm shadow-xl hover:bg-yellow-300">
            🔄 Nowa Gra
          </button>
        </div>

        <!-- NETWORK LOG -->
        <details class="group">
          <summary class="cursor-pointer text-xs text-white/30 hover:text-white/60 uppercase tracking-widest select-none">
            ▶ Logi sieciowe
          </summary>
          <div id="network-log"
               class="mt-2 bg-black/50 rounded-lg p-3 h-32 overflow-y-auto flex flex-col gap-0.5 font-mono text-xs">
            <!-- wpisy logów -->
          </div>
        </details>

      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
